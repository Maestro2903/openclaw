services:
  - type: web
    name: openclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
  - type: web
    name: telegram-gemini-bot
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: cd apps/telegram-gemini-bot && npm install && npm run build
    startCommand: cd apps/telegram-gemini-bot && npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: BASE_URL
        sync: false
